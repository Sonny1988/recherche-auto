<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbitrage Youngtimers FR→DE — 18 avr. 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d11;
      --bg-card: #16161d;
      --bg-hover: #1e1e28;
      --border: #252530;
      --border-hover: #35354a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --blue: #3b82f6;
      --blue-dim: rgba(59,130,246,0.12);
      --gray-dim: rgba(107,107,128,0.10);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 20px 60px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .header-sub {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-live { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }

    /* ── KPIs ── */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .kpi-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-family: var(--mono);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
    }
    .kpi-value.green { color: var(--green); }
    .kpi-value.amber { color: var(--amber); }
    .kpi-sub {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
      margin-right: 4px;
    }
    .filter-btn {
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .filter-btn:hover { border-color: var(--border-hover); color: var(--text); background: var(--bg-hover); }
    .filter-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
    .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* Sliders */
    .slider-wrap { display: flex; align-items: center; gap: 8px; }
    .slider-wrap input[type=range] {
      -webkit-appearance: none;
      width: 110px;
      height: 3px;
      border-radius: 2px;
      background: var(--border-hover);
      outline: none;
      cursor: pointer;
    }
    .slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--amber);
      cursor: pointer;
    }
    .slider-val {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--amber);
      min-width: 52px;
    }

    /* Number inputs */
    .range-wrap { display: flex; align-items: center; gap: 6px; }
    .range-input {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--text);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 6px;
      width: 72px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .range-input::-webkit-outer-spin-button,
    .range-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .range-input:focus { border-color: var(--border-hover); }
    .range-sep { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }

    /* ── RESULTS META ── */
    .results-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 14px;
      font-family: var(--mono);
    }
    .results-meta span { color: var(--text); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 10px;
    }

    /* ── CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
    .card.exceptional { border-color: rgba(34,197,94,0.35); box-shadow: 0 0 12px rgba(34,197,94,0.08); }
    .card.excellent { border-color: rgba(59,130,246,0.30); }
    .card.bon { border-color: rgba(107,107,128,0.30); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      flex: 1;
    }
    .score-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .score-exceptional { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .score-excellent { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
    .score-bon { background: var(--gray-dim); color: #94a3b8; border: 1px solid rgba(107,107,128,0.25); }
    .score-interessant { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
    .score-faible { background: rgba(107,107,128,0.08); color: var(--muted); border: 1px solid var(--border); }

    .card-prices {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .price-block { display: flex; flex-direction: column; gap: 2px; }
    .price-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
    .price-val {
      font-family: var(--mono);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }
    .price-val.profit-green { color: var(--green); font-size: 1rem; }
    .price-val.profit-amber { color: var(--amber); font-size: 1rem; }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .meta-tag {
      font-size: 0.62rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: var(--mono);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .plat-tag {
      font-size: 0.62rem;
      color: var(--muted);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .plat-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
    .plat-lbc { background: #f97316; }
    .plat-les { background: #8b5cf6; }
    .plat-as { background: #06b6d4; }

    .card-link {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--amber);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 4px;
      background: var(--amber-dim);
      transition: all 0.15s;
    }
    .card-link:hover { background: rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.4); }
    .card-link svg { width: 10px; height: 10px; }
    .card-link-de { color: #60a5fa; border-color: rgba(96,165,250,0.25); background: rgba(96,165,250,0.08); }
    .card-link-de:hover { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.4); }

    /* ── DELTA pill ── */
    .delta-pill {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.2);
    }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.85rem; }

    /* ── SEPARATOR ── */
    .section-sep {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── LANG SWITCHER ── */
    .lang-switcher {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }
    .lang-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 4px 9px;
      background: var(--bg-card);
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .lang-btn + .lang-btn { border-left: 1px solid var(--border); }
    .lang-btn.active { background: var(--bg-hover); color: var(--text); }
    .lang-btn:hover:not(.active) { color: var(--text); }

    /* ── SCAN BUTTON ── */
    .scan-btn {
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 5px;
      border: 1px solid rgba(245,158,11,0.4);
      background: var(--amber-dim);
      color: var(--amber);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .scan-btn:hover:not(:disabled) { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.65); }
    .scan-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .scan-btn.running {
      color: var(--green); border-color: rgba(34,197,94,0.4); background: var(--green-dim);
      animation: pulse-scan 1.4s ease-in-out infinite;
    }
    @keyframes pulse-scan { 0%,100%{opacity:1} 50%{opacity:0.55} }

    /* ── LOG PANEL ── */
    .log-panel {
      background: #0a0a0d;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--bg-card);
    }
    .log-header-title {
      font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .log-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1rem; line-height: 1; padding: 0 2px; transition: color 0.12s;
    }
    .log-close:hover { color: var(--text); }
    .log-content {
      font-family: var(--mono); font-size: 0.7rem; line-height: 1.6;
      padding: 10px 14px; max-height: 220px; overflow-y: auto; color: var(--muted);
    }
    .log-content::-webkit-scrollbar { width: 4px; }
    .log-content::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
    .log-line-log { color: #c8c8d8; }
    .log-line-err { color: #f87171; }
    .log-line-done { color: var(--green); font-weight: 600; margin-top: 4px; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .kpis { grid-template-columns: repeat(2, 1fr); }
      body { padding: 16px 12px 40px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Arbitrage Youngtimers <span style="color:var(--muted)">FR→DE</span></div>
    <div class="header-sub">Scan du 18 avr. 2026 · Mobile.de + eBay Kleinanzeigen · Frais export 1 350€ inclus</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('fr',this)">FR</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
      <button class="lang-btn" onclick="setLang('de',this)">DE</button>
    </div>
    <div class="badge badge-live">● Live Airtable</div>
  </div>
</div>

<!-- KPIs -->
<div class="kpis" id="kpis"></div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label" data-i18n="score">Score</span>
  <button class="filter-btn active" data-score="all" onclick="setScore('all',this)" data-i18n="all">Tous</button>
  <button class="filter-btn" data-score="🔥 Exceptionnel" onclick="setScore('🔥 Exceptionnel',this)">🔥 Exceptionnel</button>
  <button class="filter-btn" data-score="⭐ Excellent" onclick="setScore('⭐ Excellent',this)">⭐ Excellent</button>
  <button class="filter-btn" data-score="✅ Bon" onclick="setScore('✅ Bon',this)" data-i18n="bon">✅ Bon</button>
  <button class="filter-btn" data-score="👍 Intéressant" onclick="setScore('👍 Intéressant',this)" data-i18n="interessant">👍 Intéressant</button>
  <div class="filter-divider"></div>
  <span class="filter-label" data-i18n="brand">Marque</span>
  <button class="filter-btn active" data-marque="all" onclick="setMarque('all',this)" data-i18n="allBrands">Toutes</button>
  <button class="filter-btn" data-marque="BMW" onclick="setMarque('BMW',this)">BMW</button>
  <button class="filter-btn" data-marque="Porsche" onclick="setMarque('Porsche',this)">Porsche</button>
  <button class="filter-btn" data-marque="Mercedes" onclick="setMarque('Mercedes',this)">Mercedes</button>
  <button class="filter-btn" data-marque="Audi" onclick="setMarque('Audi',this)">Audi</button>
  <button class="filter-btn" data-marque="Volkswagen" onclick="setMarque('Volkswagen',this)">VW</button>
  <div class="filter-divider"></div>
  <div class="slider-wrap">
    <span class="filter-label" data-i18n="profitMin">Profit min</span>
    <input type="range" id="profitSlider" min="0" max="22000" step="500" value="0" oninput="setProfitMin(this.value)">
    <span class="slider-val" id="profitVal">0€</span>
  </div>
  <div class="filter-divider"></div>
  <span class="filter-label" data-i18n="priceFR">Prix FR</span>
  <div class="range-wrap">
    <input class="range-input" type="number" id="prixMin" placeholder="Min €" oninput="renderGrid()">
    <span class="range-sep">–</span>
    <input class="range-input" type="number" id="prixMax" placeholder="Max €" oninput="renderGrid()">
  </div>
  <div class="filter-divider"></div>
  <span class="filter-label" data-i18n="year">Année</span>
  <div class="range-wrap">
    <input class="range-input" type="number" id="anneeMin" data-i18n-ph="from" placeholder="De" min="1960" max="2010" oninput="renderGrid()">
    <span class="range-sep">–</span>
    <input class="range-input" type="number" id="anneeMax" data-i18n-ph="to" placeholder="À" min="1960" max="2010" oninput="renderGrid()">
  </div>
  <div class="filter-divider"></div>
  <button class="scan-btn" id="scanBtn" onclick="launchScan()">⚡ Lancer le scan</button>
</div>

<div class="log-panel" id="logPanel" style="display:none">
  <div class="log-header">
    <span class="log-header-title">Console scan</span>
    <button class="log-close" onclick="document.getElementById('logPanel').style.display='none'">✕</button>
  </div>
  <div class="log-content" id="logContent"></div>
</div>

<div class="results-meta" id="resultsMeta"></div>
<div class="grid" id="grid"></div>

<script>
// ── i18n ──
const LANGS = {
  fr: {
    score: 'Score', brand: 'Marque', profitMin: 'Profit min', priceFR: 'Prix FR', year: 'Année',
    all: 'Tous', allBrands: 'Toutes', bon: '✅ Bon', interessant: '👍 Intéressant',
    from: 'De', to: 'À',
    kpi_opps: 'Opportunités', kpi_opps_sub: 'deals détectés',
    kpi_best: 'Meilleur Profit', kpi_best_sub: 'profit brut max',
    kpi_avg: 'Profit Moyen', kpi_avg_sub: 'par opportunité',
    kpi_exc: 'Exceptionnels 🔥', kpi_exc_sub: 'profit ≥ 8 000€',
    kpi_fees: 'Frais Export', kpi_fees_sub: 'transport+immat+TÜV',
    lbl_priceFR: 'Prix FR', lbl_priceDE: 'Réf DE', lbl_profit: 'Profit brut',
    results: (n) => `<span>${n}</span> résultat${n!==1?'s':''} affiché${n!==1?'s':''}`,
    empty: 'Aucun résultat pour ces filtres.',
    annonce: '🇫🇷 Annonce', refDE: '🇩🇪 Réf DE',
    headerSub: 'Scan du 18 avr. 2026 · Mobile.de + eBay Kleinanzeigen · Frais export 1 350€ inclus',
  },
  en: {
    score: 'Score', brand: 'Brand', profitMin: 'Min profit', priceFR: 'FR price', year: 'Year',
    all: 'All', allBrands: 'All', bon: '✅ Good', interessant: '👍 Interesting',
    from: 'From', to: 'To',
    kpi_opps: 'Opportunities', kpi_opps_sub: 'deals found',
    kpi_best: 'Best Profit', kpi_best_sub: 'max gross profit',
    kpi_avg: 'Avg Profit', kpi_avg_sub: 'per opportunity',
    kpi_exc: 'Exceptional 🔥', kpi_exc_sub: 'profit ≥ €8,000',
    kpi_fees: 'Export Costs', kpi_fees_sub: 'transport+reg+TÜV',
    lbl_priceFR: 'FR Price', lbl_priceDE: 'DE Ref', lbl_profit: 'Gross profit',
    results: (n) => `<span>${n}</span> result${n!==1?'s':''} shown`,
    empty: 'No results for these filters.',
    annonce: '🇫🇷 Listing', refDE: '🇩🇪 DE Ref',
    headerSub: 'Scan Apr 18 2026 · Mobile.de + eBay Kleinanzeigen · €1,350 export costs included',
  },
  de: {
    score: 'Bewertung', brand: 'Marke', profitMin: 'Min. Gewinn', priceFR: 'FR Preis', year: 'Jahr',
    all: 'Alle', allBrands: 'Alle', bon: '✅ Gut', interessant: '👍 Interessant',
    from: 'Von', to: 'Bis',
    kpi_opps: 'Angebote', kpi_opps_sub: 'Deals gefunden',
    kpi_best: 'Bester Gewinn', kpi_best_sub: 'max. Bruttogewinn',
    kpi_avg: 'Ø Gewinn', kpi_avg_sub: 'pro Angebot',
    kpi_exc: 'Ausnahme 🔥', kpi_exc_sub: 'Gewinn ≥ 8.000€',
    kpi_fees: 'Exportkosten', kpi_fees_sub: 'Transport+Zulassung+TÜV',
    lbl_priceFR: 'FR Preis', lbl_priceDE: 'DE Referenz', lbl_profit: 'Bruttogewinn',
    results: (n) => `<span>${n}</span> Ergebnis${n!==1?'se':''} angezeigt`,
    empty: 'Keine Ergebnisse für diese Filter.',
    annonce: '🇫🇷 Inserat', refDE: '🇩🇪 DE Ref',
    headerSub: 'Scan 18. Apr. 2026 · Mobile.de + eBay Kleinanzeigen · 1.350€ Exportkosten inkl.',
  },
};

let currentLang = 'fr';
function t(key) { return LANGS[currentLang][key] || LANGS.fr[key] || key; }

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // update static data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (t(k)) el.textContent = t(k);
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph');
    if (t(k)) el.placeholder = t(k);
  });
  document.querySelector('.header-sub').textContent = t('headerSub');
  renderKPIs();
  renderGrid();
}

// State
let filterScore = 'all';
let filterMarque = 'all';
let filterProfitMin = 0;

function getMarque(titre) {
  const s = titre.toLowerCase();
  if (s.includes('porsche')) return 'Porsche';
  if (s.includes('bmw')) return 'BMW';
  if (s.includes('mercedes')) return 'Mercedes';
  if (s.includes('audi')) return 'Audi';
  if (s.includes('volkswagen') || s.includes('vw') || s.includes('golf') || s.includes('corrado')) return 'Volkswagen';
  return 'Autre';
}

function fmtEur(n) {
  return n.toLocaleString('fr-FR') + '\u202f€';
}
function fmtKm(n) {
  return n ? n.toLocaleString('fr-FR') + ' km' : '—';
}

function scoreClass(s) {
  if (s.includes('Exceptionnel')) return 'exceptional';
  if (s.includes('Excellent')) return 'excellent';
  if (s.includes('Bon')) return 'bon';
  return '';
}
function scoreBadgeClass(s) {
  if (s.includes('Exceptionnel')) return 'score-exceptional';
  if (s.includes('Excellent')) return 'score-excellent';
  if (s.includes('Bon')) return 'score-bon';
  if (s.includes('Intéressant')) return 'score-interessant';
  return 'score-faible';
}

function profitClass(p) {
  return p >= 8000 ? 'profit-amber' : 'profit-green';
}

function platDot(p) {
  if (p === 'LeBonCoin') return 'plat-lbc';
  if (p === 'LesAnciennes') return 'plat-les';
  return 'plat-as';
}

function filtered() {
  const prixMin = parseInt(document.getElementById('prixMin').value) || 0;
  const prixMax = parseInt(document.getElementById('prixMax').value) || Infinity;
  const anneeMin = parseInt(document.getElementById('anneeMin').value) || 0;
  const anneeMax = parseInt(document.getElementById('anneeMax').value) || Infinity;
  return RAW.filter(d => {
    if (filterScore !== 'all' && d.score !== filterScore) return false;
    if (filterMarque !== 'all' && getMarque(d.titre) !== filterMarque) return false;
    if (d.profit < filterProfitMin) return false;
    if (d.prix_fr < prixMin || d.prix_fr > prixMax) return false;
    if (d.annee && (d.annee < anneeMin || d.annee > anneeMax)) return false;
    return true;
  });
}

function renderKPIs() {
  const all = RAW;
  const profitable = all.filter(d => d.profit > 0);
  const best = Math.max(...profitable.map(d => d.profit));
  const avg = Math.round(profitable.reduce((s, d) => s + d.profit, 0) / profitable.length);
  const exceptional = all.filter(d => d.score.includes('Exceptionnel')).length;

  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">${t('kpi_opps')}</div>
      <div class="kpi-value">${all.length}</div>
      <div class="kpi-sub">${t('kpi_opps_sub')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${t('kpi_best')}</div>
      <div class="kpi-value amber">${fmtEur(best)}</div>
      <div class="kpi-sub">${t('kpi_best_sub')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${t('kpi_avg')}</div>
      <div class="kpi-value green">${fmtEur(avg)}</div>
      <div class="kpi-sub">${t('kpi_avg_sub')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${t('kpi_exc')}</div>
      <div class="kpi-value">${exceptional}</div>
      <div class="kpi-sub">${t('kpi_exc_sub')}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${t('kpi_fees')}</div>
      <div class="kpi-value" style="font-size:1.1rem;color:var(--muted)">1 350€</div>
      <div class="kpi-sub">${t('kpi_fees_sub')}</div>
    </div>
  `;
}

function renderGrid() {
  const data = filtered();
  document.getElementById('resultsMeta').innerHTML = t('results')(data.length);

  if (!data.length) {
    document.getElementById('grid').innerHTML = `<div class="empty">${t('empty')}</div>`;

  document.getElementById('grid').innerHTML = data.map(d => `
    <div class="card ${scoreClass(d.score)}">
      <div class="card-top">
        <div class="card-title">${d.titre}</div>

      </div>

      <div class="card-prices">
        <div class="price-block">
          <span class="price-label">${t('lbl_priceFR')}</span>

        </div>
        <div class="price-block">
          <span class="price-label">${t('lbl_priceDE')}</span>
          <span class="price-val">${fmtEur(d.prix_de)}</span>
        </div>
        <div class="price-block">
          <span class="price-label">${t('lbl_profit')}</span>
          <span class="price-val ${profitClass(d.profit)}">${fmtEur(d.profit)}</span>
        </div>
      </div>

      <div class="card-meta">
        ${d.annee ? `<span class="meta-tag">${d.annee}</span>` : ''}
        ${d.km ? `<span class="meta-tag">${fmtKm(d.km)}</span>` : ''}
        ${d.carb ? `<span class="meta-tag">${d.carb}</span>` : ''}
        <span class="delta-pill">+${d.delta}%</span>

        <div class="plat-tag">

    </div>
  `).join('');

function setScore(val, btn) {
  filterScore = val;
  document.querySelectorAll('[data-score]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setMarque(val, btn) {
  filterMarque = val;
  document.querySelectorAll('[data-marque]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setProfitMin(val) {
  filterProfitMin = parseInt(val);
  document.getElementById('profitVal').textContent = parseInt(val).toLocaleString('fr-FR') + '€';
  renderGrid();
}

function launchScan() {
  const btn = document.getElementById('scanBtn');
  const panel = document.getElementById('logPanel');
  const content = document.getElementById('logContent');

  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = '⏳ Scan en cours…';
  content.innerHTML = '';
  panel.style.display = 'block';

  const marques = filterMarque !== 'all' ? [filterMarque] : [];

  fetch('/api/scan', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ marques }),
  }).then(res => {
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    function pump() {
      reader.read().then(({ done, value }) => {
        if (done) { reset(); return; }
        buf += dec.decode(value, { stream: true });
        buf.split('\n').forEach((line, i, arr) => {
          if (i === arr.length - 1) { buf = line; return; }
          if (!line.startsWith('data: ')) return;
          try {
            const { type, msg } = JSON.parse(line.slice(6));
            msg.split('\n').filter(Boolean).forEach(m => {
              const div = document.createElement('div');
              div.className = `log-line-${type}`;
              div.textContent = m;
              content.appendChild(div);
            });
            content.scrollTop = content.scrollHeight;
            if (type === 'done') reset();
          } catch {}
        });
        pump();
      });
    }
    pump();
  }).catch(() => {
    const div = document.createElement('div');
    div.className = 'log-line-err';
    div.textContent = '❌ Serveur inaccessible. Lancez: node server.js';
    content.appendChild(div);
    reset();
  });

  function reset() {
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = '⚡ Lancer le scan';
  }
}

renderKPIs();
renderGrid();
</script>
